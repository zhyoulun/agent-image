name: Publish Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          echo "date_tag=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          tags: |
            fabulerg/agent-image:latest
            fabulerg/agent-image:${{ steps.meta.outputs.date_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created_at }}
            org.opencontainers.image.version=${{ steps.meta.outputs.date_tag }}
